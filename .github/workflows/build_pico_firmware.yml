# ============================================================================
# Auto-build Pico HID Proxy firmware on every push to main
# Produces aether_pico.uf2 as a downloadable artifact
# ============================================================================
name: Build Pico Firmware

on:
  push:
    branches: [main, master]
    paths:
      - 'pico_firmware/**'
  workflow_dispatch:   # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ARM GCC
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi build-essential

      - name: Cache Pico SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: /tmp/pico-sdk
          key: pico-sdk-2.1.0

      - name: Clone Pico SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch 2.1.0 \
            https://github.com/raspberrypi/pico-sdk.git /tmp/pico-sdk
          cd /tmp/pico-sdk
          git submodule update --init

      - name: Clone Pico-PIO-USB
        run: |
          mkdir -p pico_firmware/lib
          git clone --depth 1 \
            https://github.com/sekigon-gonnoc/Pico-PIO-USB.git \
            pico_firmware/lib/pico-pio-usb

      - name: Build Firmware
        run: |
          cd pico_firmware
          mkdir build && cd build
          cmake .. -DPICO_SDK_PATH=/tmp/pico-sdk -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Upload UF2 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aether_pico_firmware
          path: |
            pico_firmware/build/aether_pico.uf2
            pico_firmware/build/aether_pico.bin
            pico_firmware/build/aether_pico.elf
          retention-days: 90

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pico_firmware/build/aether_pico.uf2
          name: AetherAim Pico Firmware ${{ github.ref_name }}
